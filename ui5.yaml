specVersion: "4.0"
metadata:
  name: padones.santa.fe
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        backend:
          - path: /sap
            url: https://my415609-api.s4hana.cloud.sap
            destination: S4HANA-BP
          - path: /pricing
            pathReplace: ""
            url: https://my415609-api.s4hana.cloud.sap
            destination: S4HANA-PRICING
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: padones.santa.fe
        ui5Theme: sap_horizon
